services:
  db:
    image: postgres:17-alpine
    container_name: dm-portfolio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
    volumes:
      - dm_portfolio_db:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    expose:
      - "5432"

  backend:
    build:
      context: ./server
      dockerfile: ../docker/backend.Dockerfile
    container_name: dm-portfolio-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-portfolio}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?ADMIN_PASSWORD_HASH is required}
      CONTACT_RATE_LIMIT_PER_HOUR: ${CONTACT_RATE_LIMIT_PER_HOUR:-5}
      ADMIN_URL: ${ADMIN_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_TO: ${MAIL_TO:-}
      COOKIE_SECURE: "true"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: dm-portfolio-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
    container_name: dm-portfolio-admin
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  dm_portfolio_db:
