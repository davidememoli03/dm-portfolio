services:
  backend:
    build:
      context: ./server
      dockerfile: ../docker/backend.Dockerfile
    container_name: dm-portfolio-backend
    restart: unless-stopped
    environment:
      PORT: 3000
    expose:
      - "3000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: dm-portfolio-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
