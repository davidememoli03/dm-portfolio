<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>DM Portfolio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#f5f3ff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0b0d18" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('dm-portfolio.theme');
        if (stored === 'light' || stored === 'dark') {
          document.documentElement.dataset.theme = stored;
        }
      } catch (_) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
