<section class="px-6 py-16 sm:px-10 lg:px-16">
  <div class="mx-auto max-w-6xl">
    <div class="arc-panel arc-panel-purple mb-10">
      <div class="arc-panel-header">
        <h2 class="arc-text-neon arc-glow-purple">PROGETTI</h2>
      </div>
      <div class="arc-panel-body">
        <p class="arc-text-caption">Una selezione dei lavori piu recenti</p>
      </div>
    </div>

    <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
      @for (project of projects(); track project.id) {
        <article class="arc-card arc-card-cyan arc-card-glow flex flex-col">
          <div class="arc-card-header">
            <h3 class="arc-text-mono">{{ project.title }}</h3>
          </div>

          <div class="arc-card-body flex-1">
            <p class="arc-text-body">{{ project.description }}</p>

            <div class="mt-4 flex flex-wrap gap-2">
              @for (tech of project.technologies; track tech) {
                <span class="arc-badge arc-badge-outline">{{ tech }}</span>
              }
            </div>
          </div>

          <div class="arc-card-footer flex gap-3">
            @if (project.url) {
              <a
                [href]="project.url"
                target="_blank"
                rel="noopener noreferrer"
                class="arc-btn arc-btn-primary arc-btn-sm"
                arcadeSoundClick="select"
              >
                DEMO
              </a>
            }
            @if (project.repoUrl) {
              <a
                [href]="project.repoUrl"
                target="_blank"
                rel="noopener noreferrer"
                class="arc-btn arc-btn-ghost arc-btn-sm"
                arcadeSoundClick="select"
              >
                REPO
              </a>
            }
          </div>
        </article>
      }
    </div>
  </div>
</section>
