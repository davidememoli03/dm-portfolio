<section class="px-6 py-16 sm:px-10 lg:px-16">
  <div class="mx-auto max-w-6xl">
    <div class="mb-10 text-center">
      <h2 class="text-3xl font-bold text-white">Progetti</h2>
      <p class="mt-2 text-slate-400">Una selezione dei lavori più recenti</p>
    </div>

    <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
      @for (project of projects(); track project.id) {
        <article class="flex flex-col rounded-2xl border border-slate-700/80 bg-slate-900/70 p-6 shadow-lg backdrop-blur">
          <h3 class="text-xl font-semibold text-white">{{ project.title }}</h3>
          <p class="mt-3 flex-1 text-sm leading-6 text-slate-300">
            {{ project.description }}
          </p>

          <div class="mt-4 flex flex-wrap gap-2">
            @for (tech of project.technologies; track tech) {
              <span class="rounded-full bg-indigo-500/15 px-3 py-1 text-xs font-medium text-indigo-200">
                {{ tech }}
              </span>
            }
          </div>

          <div class="mt-6 flex gap-3">
            @if (project.url) {
              <a
                [href]="project.url"
                target="_blank"
                rel="noopener noreferrer"
                class="rounded-lg bg-indigo-500 px-4 py-2 text-sm font-medium text-white transition hover:bg-indigo-400"
              >
                Demo
              </a>
            }
            @if (project.repoUrl) {
              <a
                [href]="project.repoUrl"
                target="_blank"
                rel="noopener noreferrer"
                class="rounded-lg border border-slate-600 px-4 py-2 text-sm font-medium text-slate-200 transition hover:border-slate-400"
              >
                Repository
              </a>
            }
          </div>
        </article>
      }
    </div>
  </div>
</section>
