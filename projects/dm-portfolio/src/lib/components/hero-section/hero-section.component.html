<section class="px-6 py-16 sm:px-10 lg:px-16">
  <div class="arc-panel arc-panel-cyan mx-auto max-w-4xl">
    <div class="arc-panel-header">
      <span class="arc-badge arc-badge-cyan arc-badge-pulse">{{ 'hero.badge' | translate }}</span>
      @if (profile().location) {
        <span class="arc-badge arc-badge-outline arc-text-caption">{{ profile().location }}</span>
      }
    </div>

    <div class="arc-panel-body text-center">
      <h1 class="arc-text-neon arc-glow-cyan arc-text-pixel-shadow">
        {{ profile().name }}
      </h1>
      <p class="arc-text-mono arc-glow-green mt-4">{{ profile().title }}</p>
      <p class="arc-text-body mt-6 max-w-2xl mx-auto">
        {{ profile().bio }}
      </p>
    </div>

    <div class="arc-panel-footer justify-center">
      <a
        [href]="'mailto:' + profile().email"
        class="arc-btn arc-btn-primary"
        arcadeSoundClick="select"
      >
        {{ 'hero.contact' | translate }}
      </a>
    </div>
  </div>
</section>
