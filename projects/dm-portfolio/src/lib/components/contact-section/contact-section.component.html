<section class="px-6 py-16 sm:px-10 lg:px-16">
  <div class="mx-auto max-w-3xl rounded-3xl border border-slate-700/80 bg-slate-900/70 p-10 text-center shadow-xl">
    <h2 class="text-3xl font-bold text-white">Contatti</h2>
    <p class="mt-3 text-slate-400">Hai un progetto in mente? Scrivimi.</p>

    <a
      [href]="'mailto:' + profile().email"
      class="mt-8 inline-flex rounded-xl bg-indigo-500 px-6 py-3 text-sm font-semibold text-white transition hover:bg-indigo-400"
    >
      {{ profile().email }}
    </a>

    <div class="mt-6 flex items-center justify-center gap-4">
      @if (profile().github) {
        <a
          [href]="profile().github"
          target="_blank"
          rel="noopener noreferrer"
          class="text-sm text-slate-300 transition hover:text-white"
        >
          GitHub
        </a>
      }
      @if (profile().linkedin) {
        <a
          [href]="profile().linkedin"
          target="_blank"
          rel="noopener noreferrer"
          class="text-sm text-slate-300 transition hover:text-white"
        >
          LinkedIn
        </a>
      }
    </div>
  </div>
</section>
