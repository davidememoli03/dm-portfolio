<section class="px-6 py-16 sm:px-10 lg:px-16">
  <div class="arc-panel arc-panel-green mx-auto max-w-3xl text-center">
    <div class="arc-panel-header justify-center">
      <h2 class="arc-text-neon arc-glow-green">CONTATTI</h2>
    </div>

    <div class="arc-panel-body">
      <p class="arc-text-caption">Hai un progetto in mente? Scrivimi.</p>

      <a
        [href]="'mailto:' + profile().email"
        class="arc-btn arc-btn-primary mt-8"
        arcadeSoundClick="coin"
      >
        {{ profile().email }}
      </a>
    </div>

    <div class="arc-panel-footer justify-center gap-4">
      @if (profile().github) {
        <a
          [href]="profile().github"
          target="_blank"
          rel="noopener noreferrer"
          class="arc-btn arc-btn-ghost arc-btn-sm"
          arcadeSoundClick="select"
        >
          GITHUB
        </a>
      }
      @if (profile().linkedin) {
        <a
          [href]="profile().linkedin"
          target="_blank"
          rel="noopener noreferrer"
          class="arc-btn arc-btn-ghost arc-btn-sm"
          arcadeSoundClick="select"
        >
          LINKEDIN
        </a>
      }
    </div>
  </div>
</section>
