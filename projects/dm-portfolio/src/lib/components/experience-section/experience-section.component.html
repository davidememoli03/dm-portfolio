<section id="experience" class="content-wrap scroll-mt-24 py-16 sm:py-20" dmScrollReveal>
  <div class="mb-10 max-w-2xl sm:mb-14">
    <h2 class="text-headline text-[var(--color-text)]">
      {{ 'experience.title' | translate }}
    </h2>
    <p class="mt-3 text-base text-[var(--color-text-muted)] sm:text-lg">
      {{ 'experience.subtitle' | translate }}
    </p>
  </div>

  <div class="grid gap-5">
    @for (entry of experience(); track entry.id) {
    <article
      class="glass group rounded-2xl p-6 transition-all duration-200 hover:-translate-y-0.5 hover:shadow-[var(--shadow-glass-strong)]">
      <header class="flex flex-col gap-2 sm:flex-row sm:items-start sm:justify-between">
        <div>
          <h3 class="text-lg font-semibold leading-tight text-[var(--color-text)] sm:text-xl">
            <a [href]="entry.url" target="_blank" rel="noopener noreferrer"
              class="transition-colors hover:text-[var(--color-accent)]">
              {{ entry.company }}
            </a>
          </h3>
          <p class="mt-1 text-sm font-medium text-[var(--color-accent)]">
            {{ entry.role }}
          </p>
        </div>
        <p class="text-sm text-[var(--color-text-subtle)] sm:text-right">
          {{ entry.period }}
        </p>
      </header>

      <p class="mt-4 text-sm leading-relaxed text-[var(--color-text-muted)] sm:text-base">
        {{ entry.description }}
      </p>

      <footer class="mt-5 border-t border-[var(--color-surface-glass-border)] pt-4">
        <a [href]="entry.url" target="_blank" rel="noopener noreferrer"
          class="inline-flex min-h-[36px] items-center gap-2 rounded-full border border-[var(--color-surface-glass-border)] px-3.5 py-1.5 text-xs font-semibold text-[var(--color-text)] transition-colors hover:bg-[var(--color-accent-soft)]">
          <dm-icon name="external-link" [size]="12" />
          {{ 'experience.visitWebsite' | translate }}
        </a>
      </footer>
    </article>
    }
  </div>
</section>
