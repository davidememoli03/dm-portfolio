services:
  db:
    image: postgres:17-alpine
    container_name: dm-portfolio-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
    volumes:
      - dm_portfolio_db_dev:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./server
      dockerfile: ../docker/backend.dev.Dockerfile
    container_name: dm-portfolio-backend-dev
    volumes:
      - ./server:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-portfolio}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      # Default dev password is "admin" (override via .env for anything else).
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-$$2b$$10$$JVkYGsubuszwDLz7LWaPGOM9dnEgFurFHd2/NJNMCt4MV3YoJp5K.}
      CONTACT_RATE_LIMIT_PER_HOUR: ${CONTACT_RATE_LIMIT_PER_HOUR:-5}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:4201}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_TO: ${MAIL_TO:-}
      COOKIE_SECURE: "false"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.dev.Dockerfile
    container_name: dm-portfolio-frontend-dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"

  admin:
    build:
      context: .
      dockerfile: docker/admin.dev.Dockerfile
    container_name: dm-portfolio-admin-dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "4201:4201"
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"

volumes:
  dm_portfolio_db_dev:
