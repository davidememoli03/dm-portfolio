server {
  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;

  # Preserve the visitor IP set by Caddy (or another edge proxy).
  set_real_ip_from 10.0.0.0/8;
  set_real_ip_from 172.16.0.0/12;
  set_real_ip_from 192.168.0.0/16;
  set_real_ip_from 127.0.0.0/8;
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  # ---- Compression (Core Web Vitals) -----------------------------------
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/xml+rss
    application/atom+xml
    application/manifest+json
    application/ld+json
    image/svg+xml
    font/ttf
    font/otf
    application/font-woff
    application/font-woff2;

  # ---- Default security headers (good for SEO/trust signals) -----------
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
  add_header X-Robots-Tag "index, follow, max-image-preview:large" always;

  # ---- API proxy --------------------------------------------------------
  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API responses must not be indexed.
    add_header X-Robots-Tag "noindex, nofollow" always;
  }

  # ---- SEO assets: serve fresh, allow crawlers -------------------------
  location = /robots.txt {
    add_header X-Robots-Tag "noindex" always;
    add_header Cache-Control "public, max-age=3600";
    access_log off;
    try_files $uri =404;
  }

  location = /sitemap.xml {
    add_header Content-Type "application/xml; charset=utf-8";
    add_header X-Robots-Tag "noindex" always;
    add_header Cache-Control "public, max-age=3600";
    access_log off;
    try_files $uri =404;
  }

  location = /manifest.webmanifest {
    add_header Content-Type "application/manifest+json; charset=utf-8";
    add_header Cache-Control "public, max-age=3600";
    try_files $uri =404;
  }

  location = /favicon.ico {
    add_header Cache-Control "public, max-age=604800";
    access_log off;
    log_not_found off;
    try_files $uri =404;
  }

  # ---- Hashed bundles: aggressive caching ------------------------------
  location ~* \.(?:js|css|woff2?|ttf|otf|eot)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # ---- Images / fonts: long cache (not immutable) ----------------------
  location ~* \.(?:jpg|jpeg|png|gif|webp|avif|svg|ico)$ {
    add_header Cache-Control "public, max-age=2592000";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # ---- SPA fallback: index.html revalidated but bf-cache friendly ------
  # `no-cache` forces revalidation on every request (so new hashed bundles
  # are always picked up) without the `no-store` penalty that disables the
  # browser back/forward cache.
  location = /index.html {
    add_header Cache-Control "no-cache" always;
  }

  location / {
    add_header Cache-Control "no-cache" always;
    try_files $uri $uri/ /index.html;
  }
}
